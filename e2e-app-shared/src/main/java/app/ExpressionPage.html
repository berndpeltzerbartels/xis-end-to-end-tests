<!DOCTYPE html>
<html xmlns:xis="https://xis.one/xsd" lang="en">
<head><title>Expression Language</title></head>
<body>
<h1 id="headline">${headline}</h1>

<p id="user-summary" title="${tooltip}" data-user="${user.name}">
  ${user.name} has role ${user.role}
</p>

<p id="computed-key">${lookup[prefix + '_item'].label}</p>
<p id="ternary">${visible ? 'enabled' : 'disabled'}</p>
<p id="default-value">${defaultValue(emptyValue, 'fallback')}</p>
<p id="joined-items">${join(items, ', ')}</p>

<section id="visible-section" xis:if="${visible}">
  Visible content
</section>

<section id="hidden-section" xis:if="${hidden}">
  Hidden content
</section>

<section id="comparison-section" xis:if="items[1] == 'beta' && notEmpty(user.name)">
  Comparison content
</section>

<xis:if condition="${visible}">
  <section id="tag-if-section">Tag condition content</section>
</xis:if>

<ul id="tag-items">
  <xis:foreach var="product" array="products">
    <li class="tag-item" data-id="${product.id}">${product.label}</li>
  </xis:foreach>
</ul>

<ul id="attribute-items">
  <li class="attribute-item" xis:foreach="item:items">${item}</li>
</ul>

<a id="nav-home" xis:page="/index.html">Home</a>
</body>
</html>
