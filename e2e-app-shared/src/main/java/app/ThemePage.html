<!DOCTYPE html>
<html xmlns:xis="https://xis.one/xsd" lang="en">
<head><title>Theme</title></head>
<body>
<theme:navigation id="theme-nav" logo="/theme-logo.svg" logo-alt="Theme test app">
    <theme:nav-item id="theme-home" page="/index.html" label="Home"/>
    <theme:nav-group label="Products">
        <theme:nav-item id="theme-sub-1" page="/theme.html" label="Sub 1"/>
    </theme:nav-group>
</theme:navigation>

<theme:form-page title="Theme layout"
                 binding="layout"
                 action="saveLayout"
                 submit-label="Save">
    <theme:grid id="theme-grid" columns="3">
        <theme:input id="grid-name" binding="name" title="Name" span="2"/>
        <theme:input id="grid-city" binding="city" title="City"/>
        <theme:select id="grid-stage"
                      binding="stage"
                      title="Stage"
                      options="stages"
                      option-value="code"
                      option-label="label"
                      span="3"/>
        <theme:input id="grid-email" binding="email" title="E-mail"/>
        <theme:input id="grid-phone" binding="phone" title="Phone"/>
        <theme:input id="grid-notes" binding="notes" title="Notes"/>
    </theme:grid>
    <button id="theme-button" type="button">Themed Button</button>
</theme:form-page>
</body>
</html>
