plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.0'
    id 'io.spring.dependency-management' version '1.1.5'
}

dependencies {
    implementation project(':e2e-app-security-shared')
    implementation "one.xis:xis-spring:$xisVersion"
    implementation "one.xis:xis-authentication:$xisVersion"
    implementation "one.xis:xis-idp-client:$xisVersion"
    implementation "org.springframework.boot:spring-boot-starter-web:$springBootVersion"
}

springBoot {
    mainClass = 'app.ExternalSecuritySpringMain'
}

bootJar {
    archiveClassifier = 'runnable'
}
