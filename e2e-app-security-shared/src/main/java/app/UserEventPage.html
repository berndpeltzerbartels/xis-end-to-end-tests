<!DOCTYPE html>
<html xmlns:xis="https://xis.one/xsd" lang="en">
<head>
    <title>User Events</title>
</head>
<body>
<h1 id="user-events-title">User Events</h1>
<p id="user-event-user">${userId}</p>
