plugins {
    id 'java'
    id 'application'
    id 'one.xis.plugin'
}

dependencies {
    implementation project(':e2e-app-security-shared')
    implementation "one.xis:xis-boot"
    implementation "one.xis:xis-authentication"
    implementation "one.xis:xis-idp-client"
    implementation "org.slf4j:slf4j-simple:$slf4jVersion"
}

application {
    mainClass = 'app.XisIdpClientMain'
}

jar {
    dependsOn configurations.runtimeClasspath

    manifest {
        attributes 'Main-Class': 'app.XisIdpClientMain'
    }
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    archiveClassifier = 'runnable'
}
