<!DOCTYPE html>
<html xmlns:xis="https://xis.one/xsd" lang="en">
<head>
    <title>Events</title>
</head>
<body>
<h1 id="events-title">Events</h1>
<p id="event-version">${version}</p>
<a id="open-follow-events" xis:page="/follow-events.html">Follow events</a>
<button id="publish-all" xis:action="publishToAll">Publish to all</button>
<button id="publish-client" xis:action="publishToCurrentClient">Publish to current client</button>
<button id="publish-follow-page" xis:action="publishFollowPageEvent">Publish follow page</button>
<button id="publish-source-frontlet" xis:action="publishSourceFrontletEvent">Publish source frontlet</button>
<button id="publish-follow-frontlet" xis:action="publishFollowFrontletEvent">Publish follow frontlet</button>
<button id="reset-events" xis:action="resetEvents">Reset events</button>

<section id="source-container">
    <xis:frontlet-container container-id="event-source" default-frontlet="EventSourceFrontlet"/>
</section>

<section id="target-container">
    <xis:frontlet-container container-id="event-target" default-frontlet="EventTargetFrontlet"/>
</section>
</body>
</html>
